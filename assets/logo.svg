<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56">
    <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c5cff"/>
            <stop offset="100%" stop-color="#4dabff"/>
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Mark -->
    <rect x="2" y="6" width="44" height="44" rx="12" fill="url(#lg)" filter="url(#glow)"/>
    <g fill="#ffffff" font-family="Inter, sans-serif" font-weight="800" font-size="22" letter-spacing="-1.2">
        <text x="24" y="35.5" text-anchor="middle">JJ</text>
    </g>

    <!-- Wordmark -->
    <text x="58" y="28" fill="#ededf2" font-family="Inter, sans-serif" font-weight="700" font-size="18" letter-spacing="-0.6">Jason Jay</text>
    <text x="58" y="46" fill="#9999a8" font-family="Inter, sans-serif" font-weight="500" font-size="12" letter-spacing="0.4">A B A B A O</text>
</svg>
