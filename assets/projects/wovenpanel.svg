<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="wp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4ede2"/>
            <stop offset="100%" stop-color="#e1d3bc"/>
        </linearGradient>
        <linearGradient id="wp-wood" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#b8946a"/>
            <stop offset="100%" stop-color="#8e6e48"/>
        </linearGradient>
        <linearGradient id="wp-wood-dark" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7a5538"/>
            <stop offset="100%" stop-color="#4d3320"/>
        </linearGradient>
        <pattern id="slats" x="0" y="0" width="8" height="100" patternUnits="userSpaceOnUse">
            <rect width="5" height="100" fill="url(#wp-wood)"/>
            <rect x="5" width="3" height="100" fill="#1a1108"/>
        </pattern>
        <pattern id="slats-dark" x="0" y="0" width="8" height="100" patternUnits="userSpaceOnUse">
            <rect width="5" height="100" fill="url(#wp-wood-dark)"/>
            <rect x="5" width="3" height="100" fill="#0a0604"/>
        </pattern>
    </defs>

    <rect width="800" height="500" fill="url(#wp-bg)"/>
    <rect x="0" y="0" width="800" height="32" fill="#ffffff"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#e8dcc8"/>

    <g transform="translate(40, 60)">
        <rect x="0" y="0" width="32" height="32" fill="url(#slats)" rx="4"/>
        <text x="42" y="22" fill="#3a2a18" font-family="Inter,sans-serif" font-weight="700" font-size="16" letter-spacing="-0.5">Woven Panel</text>
        <g font-family="Inter,sans-serif" font-size="10" fill="#5a4a38" font-weight="500">
            <text x="490" y="22">Products</text>
            <text x="550" y="22">Inspiration</text>
            <text x="620" y="22">Trade</text>
            <text x="665" y="22">Contact</text>
            <text x="720" y="22">Quote</text>
        </g>
    </g>

    <g transform="translate(40, 120)">
        <text x="0" y="0" fill="#8a6a4a" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="2">ACOUSTIC WALL PANELS · AU</text>
        <text x="0" y="48" fill="#2a1a08" font-family="Inter,sans-serif" font-weight="800" font-size="40" letter-spacing="-1.5">Warmth meets</text>
        <text x="0" y="88" fill="#2a1a08" font-family="Inter,sans-serif" font-weight="800" font-size="40" letter-spacing="-1.5">acoustics.</text>
        <text x="0" y="118" fill="#5a4a38" font-family="Inter,sans-serif" font-size="12">Premium slatted timber panels for modern interiors.</text>
        <rect x="0" y="138" width="130" height="40" rx="0" fill="#2a1a08"/>
        <text x="65" y="163" text-anchor="middle" fill="#f4ede2" font-family="Inter,sans-serif" font-weight="600" font-size="11">Browse Panels →</text>
    </g>

    <!-- Wood panel visual -->
    <g transform="translate(440, 110)">
        <rect width="320" height="240" fill="url(#slats)" rx="6"/>
        <rect width="320" height="240" fill="#000" opacity="0.15" rx="6"/>
    </g>

    <g transform="translate(40, 380)">
        <rect width="170" height="90" rx="4" fill="#fff"/>
        <rect x="14" y="14" width="40" height="50" fill="url(#slats)" rx="2"/>
        <text x="64" y="32" fill="#3a2a18" font-family="Inter,sans-serif" font-weight="600" font-size="11">Oak Natural</text>
        <text x="64" y="48" fill="#8a6a4a" font-family="Inter,sans-serif" font-size="9">From $89/m²</text>
        <text x="64" y="64" fill="#5a8a4a" font-family="Inter,sans-serif" font-size="9">★★★★★</text>

        <g transform="translate(190, 0)">
            <rect width="170" height="90" rx="4" fill="#fff"/>
            <rect x="14" y="14" width="40" height="50" fill="url(#slats-dark)" rx="2"/>
            <text x="64" y="32" fill="#3a2a18" font-family="Inter,sans-serif" font-weight="600" font-size="11">Walnut Dark</text>
            <text x="64" y="48" fill="#8a6a4a" font-family="Inter,sans-serif" font-size="9">From $94/m²</text>
            <text x="64" y="64" fill="#5a8a4a" font-family="Inter,sans-serif" font-size="9">★★★★★</text>
        </g>

        <g transform="translate(380, 0)">
            <rect width="170" height="90" rx="4" fill="#fff"/>
            <rect x="14" y="14" width="40" height="50" fill="#d4b896" rx="2"/>
            <line x1="20" y1="14" x2="20" y2="64" stroke="#1a1108" stroke-width="1"/>
            <line x1="28" y1="14" x2="28" y2="64" stroke="#1a1108" stroke-width="1"/>
            <line x1="36" y1="14" x2="36" y2="64" stroke="#1a1108" stroke-width="1"/>
            <line x1="44" y1="14" x2="44" y2="64" stroke="#1a1108" stroke-width="1"/>
            <text x="64" y="32" fill="#3a2a18" font-family="Inter,sans-serif" font-weight="600" font-size="11">Ash Pale</text>
            <text x="64" y="48" fill="#8a6a4a" font-family="Inter,sans-serif" font-size="9">From $82/m²</text>
            <text x="64" y="64" fill="#5a8a4a" font-family="Inter,sans-serif" font-size="9">★★★★★</text>
        </g>

        <g transform="translate(570, 0)">
            <rect width="170" height="90" rx="4" fill="#2a1a08"/>
            <text x="14" y="32" fill="#d4b896" font-family="Inter,sans-serif" font-weight="600" font-size="11">Custom Sizing</text>
            <text x="14" y="50" fill="#8a6a4a" font-family="Inter,sans-serif" font-size="9">Made to measure</text>
            <text x="14" y="74" fill="#d4b896" font-family="Inter,sans-serif" font-size="10" font-weight="600">Request Quote →</text>
        </g>
    </g>
</svg>
