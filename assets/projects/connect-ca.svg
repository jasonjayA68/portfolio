<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="cc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#fff5f5"/>
        </linearGradient>
        <linearGradient id="cc-red" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#dc2626"/>
            <stop offset="100%" stop-color="#b91c1c"/>
        </linearGradient>
        <linearGradient id="cc-card" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#fef2f2"/>
        </linearGradient>
    </defs>

    <rect width="800" height="500" fill="url(#cc-bg)"/>
    <circle cx="660" cy="240" r="200" fill="#fee2e2" opacity="0.5"/>

    <rect x="0" y="0" width="800" height="32" fill="#ffffff"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#f9f9fb"/>

    <g transform="translate(40, 60)">
        <!-- Maple leaf logo -->
        <g transform="translate(0, 2)">
            <rect width="28" height="28" rx="6" fill="url(#cc-red)"/>
            <path d="M 14 6 L 16 10 L 20 9 L 18 13 L 22 14 L 18 16 L 19 20 L 14 18 L 9 20 L 10 16 L 6 14 L 10 13 L 8 9 L 12 10 Z" fill="#fff"/>
        </g>
        <text x="36" y="22" fill="#1a1a1a" font-family="Inter,sans-serif" font-weight="700" font-size="16" letter-spacing="-0.5">Connect</text>
        <text x="102" y="22" fill="#dc2626" font-family="Inter,sans-serif" font-weight="700" font-size="16">.ca</text>

        <g font-family="Inter,sans-serif" font-size="10" fill="#3a3a3a" font-weight="500">
            <text x="460" y="22">Mobile</text>
            <text x="510" y="22">Internet</text>
            <text x="560" y="22">TV</text>
            <text x="595" y="22">Support</text>
        </g>
        <rect x="660" y="6" width="90" height="22" rx="11" fill="url(#cc-red)"/>
        <text x="705" y="21" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="10">Shop Plans</text>
    </g>

    <g transform="translate(40, 130)">
        <rect width="180" height="24" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-opacity="0.3"/>
        <text x="14" y="16" fill="#dc2626" font-family="Inter,sans-serif" font-size="9" font-weight="700">🍁 PROUDLY CANADIAN</text>

        <text x="0" y="55" fill="#1a1a1a" font-family="Inter,sans-serif" font-weight="800" font-size="38" letter-spacing="-1.5">Stay connected,</text>
        <text x="0" y="95" fill="url(#cc-red)" font-family="Inter,sans-serif" font-weight="800" font-size="38" letter-spacing="-1.5">coast to coast.</text>
        <text x="0" y="125" fill="#5a5a5a" font-family="Inter,sans-serif" font-size="12">Affordable mobile, internet & TV — built for Canadians.</text>

        <rect x="0" y="148" width="140" height="40" rx="20" fill="url(#cc-red)"/>
        <text x="70" y="173" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="11">Find My Plan →</text>
    </g>

    <!-- Plans -->
    <g transform="translate(440, 130)">
        <rect width="320" height="260" rx="16" fill="url(#cc-card)" stroke="#fee2e2"/>
        <text x="20" y="32" fill="#dc2626" font-family="Inter,sans-serif" font-weight="700" font-size="10" letter-spacing="1">MOST POPULAR</text>

        <text x="20" y="62" fill="#1a1a1a" font-family="Inter,sans-serif" font-weight="700" font-size="18">Unlimited Plus</text>
        <text x="20" y="80" fill="#5a5a5a" font-family="Inter,sans-serif" font-size="11">5G · Unlimited data · Canada-wide</text>

        <text x="20" y="130" fill="#dc2626" font-family="Inter,sans-serif" font-weight="800" font-size="42">$55</text>
        <text x="100" y="125" fill="#5a5a5a" font-family="Inter,sans-serif" font-size="11">/month</text>
        <text x="20" y="146" fill="#5a5a5a" font-family="Inter,sans-serif" font-size="9">No contract · Cancel anytime</text>

        <line x1="20" y1="160" x2="300" y2="160" stroke="#fee2e2"/>

        <g font-family="Inter,sans-serif" font-size="11" fill="#1a1a1a">
            <text x="20" y="184">✓ Unlimited 5G data</text>
            <text x="20" y="204">✓ Free Canada-US roaming</text>
            <text x="20" y="224">✓ Hotspot included</text>
        </g>

        <rect x="20" y="232" width="280" height="14" rx="7" fill="url(#cc-red)"/>
        <text x="160" y="244" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="9">CHOOSE THIS PLAN →</text>
    </g>
</svg>
