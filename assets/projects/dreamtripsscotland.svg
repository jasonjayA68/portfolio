<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="ds-sky" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3a4a6a"/>
            <stop offset="50%" stop-color="#6a5a8a"/>
            <stop offset="100%" stop-color="#8a7a9a"/>
        </linearGradient>
        <linearGradient id="ds-mtn" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4a3a5a"/>
            <stop offset="100%" stop-color="#2a1a3a"/>
        </linearGradient>
        <linearGradient id="ds-heath" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8a4a6a"/>
            <stop offset="100%" stop-color="#5a2a4a"/>
        </linearGradient>
        <linearGradient id="ds-ac" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e8c14a"/>
            <stop offset="100%" stop-color="#b8911a"/>
        </linearGradient>
    </defs>

    <rect width="800" height="500" fill="url(#ds-sky)"/>
    <!-- Moon -->
    <circle cx="600" cy="120" r="32" fill="#fff8e1" opacity="0.85"/>
    <circle cx="610" cy="115" r="32" fill="#6a5a8a"/>

    <!-- Distant mountains -->
    <path d="M 0 300 L 100 220 L 200 270 L 320 200 L 440 260 L 560 210 L 680 270 L 800 230 L 800 360 L 0 360 Z" fill="url(#ds-mtn)" opacity="0.7"/>
    <!-- Closer mountains -->
    <path d="M 0 380 L 120 280 L 240 350 L 380 260 L 520 340 L 640 290 L 800 350 L 800 500 L 0 500 Z" fill="url(#ds-mtn)"/>
    <!-- Heather foreground -->
    <path d="M 0 440 L 800 440 L 800 500 L 0 500 Z" fill="url(#ds-heath)"/>

    <rect x="0" y="0" width="800" height="32" fill="#ffffff"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#e8e6f0"/>

    <g transform="translate(40, 60)">
        <text x="0" y="22" fill="#fff" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="22">Dream Trips Scotland</text>
        <g font-family="Inter,sans-serif" font-size="10" fill="#fff" font-weight="600">
            <text x="490" y="22">Tours</text>
            <text x="535" y="22">Highlands</text>
            <text x="595" y="22">Whisky</text>
            <text x="645" y="22">Castles</text>
            <text x="695" y="22">Book</text>
        </g>
    </g>

    <g transform="translate(40, 130)">
        <rect width="150" height="26" rx="13" fill="rgba(255,255,255,0.15)" stroke="url(#ds-ac)" stroke-opacity="0.6"/>
        <text x="14" y="17" fill="url(#ds-ac)" font-family="Inter,sans-serif" font-size="10" font-weight="700">★ HIGHLANDS · ISLES · MORE</text>

        <text x="0" y="68" fill="#fff" font-family="Georgia,serif" font-weight="700" font-size="44" letter-spacing="-1.5">Explore</text>
        <text x="170" y="68" fill="url(#ds-ac)" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="44" letter-spacing="-1.5">Scotland's</text>
        <text x="0" y="118" fill="#fff" font-family="Georgia,serif" font-weight="700" font-size="44" letter-spacing="-1.5">wild beauty.</text>
        <text x="0" y="148" fill="#fff" font-family="Inter,sans-serif" font-size="13" opacity="0.9">Self-drive Highland routes, castle tours, and Hebrides escapes.</text>

        <rect x="0" y="170" width="160" height="42" rx="0" fill="url(#ds-ac)"/>
        <text x="80" y="196" text-anchor="middle" fill="#2a1a3a" font-family="Inter,sans-serif" font-weight="700" font-size="11">Start Planning →</text>
    </g>

    <!-- Tour cards -->
    <g transform="translate(440, 130)">
        <rect width="320" height="280" rx="16" fill="#2a1a3a" stroke="#e8c14a" stroke-opacity="0.3"/>

        <text x="20" y="34" fill="url(#ds-ac)" font-family="Inter,sans-serif" font-weight="700" font-size="10" letter-spacing="2">FEATURED TOUR</text>
        <text x="20" y="64" fill="#fff" font-family="Georgia,serif" font-weight="700" font-size="20">Isle of Skye &amp;</text>
        <text x="20" y="86" fill="#fff" font-family="Georgia,serif" font-weight="700" font-size="20">North Highlands</text>

        <line x1="20" y1="104" x2="300" y2="104" stroke="#ffffff" stroke-opacity="0.15"/>

        <g font-family="Inter,sans-serif" fill="#cfc6df" font-size="11">
            <text x="20" y="128">📍 Edinburgh → Skye → Inverness</text>
            <text x="20" y="148">📅 9 days · 8 nights</text>
            <text x="20" y="168">🏰 4 castles · 2 distilleries</text>
            <text x="20" y="188">👤 Private guide included</text>
        </g>

        <line x1="20" y1="206" x2="300" y2="206" stroke="#ffffff" stroke-opacity="0.15"/>

        <text x="20" y="236" fill="#cfc6df" font-family="Inter,sans-serif" font-size="10">FROM</text>
        <text x="20" y="262" fill="url(#ds-ac)" font-family="Inter,sans-serif" font-weight="800" font-size="22">£2,890</text>
        <text x="108" y="262" fill="#cfc6df" font-family="Inter,sans-serif" font-size="11">per person</text>

        <rect x="200" y="240" width="100" height="28" rx="14" fill="url(#ds-ac)"/>
        <text x="250" y="258" text-anchor="middle" fill="#2a1a3a" font-family="Inter,sans-serif" font-weight="700" font-size="11">Book Now →</text>
    </g>
</svg>
