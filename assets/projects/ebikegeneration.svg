<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="eb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0e1a"/>
            <stop offset="100%" stop-color="#141b2e"/>
        </linearGradient>
        <linearGradient id="eb-ac" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a3ff12"/>
            <stop offset="100%" stop-color="#5cdb1a"/>
        </linearGradient>
        <radialGradient id="eb-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#a3ff12" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a3ff12" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="800" height="500" fill="url(#eb-bg)"/>
    <ellipse cx="600" cy="280" rx="280" ry="180" fill="url(#eb-glow)"/>

    <rect x="0" y="0" width="800" height="32" fill="#05080f"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#141b2e"/>

    <g transform="translate(40, 60)">
        <text x="0" y="22" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="16" letter-spacing="2">EBIKE</text>
        <text x="62" y="22" fill="url(#eb-ac)" font-family="Inter,sans-serif" font-weight="800" font-size="16" letter-spacing="2">GENERATION</text>
        <g font-family="Inter,sans-serif" font-size="10" fill="#8090b8" font-weight="600" letter-spacing="1">
            <text x="500" y="22">BIKES</text>
            <text x="555" y="22">PARTS</text>
            <text x="610" y="22">SUPPORT</text>
            <text x="685" y="22">CART · 0</text>
        </g>
    </g>

    <g transform="translate(40, 120)">
        <rect width="180" height="26" rx="13" fill="#1a2342" stroke="#a3ff12" stroke-opacity="0.3"/>
        <circle cx="14" cy="13" r="4" fill="#a3ff12"/>
        <text x="26" y="17" fill="#a3ff12" font-family="Inter,sans-serif" font-size="10" font-weight="600">2026 LINEUP · IN STOCK</text>

        <text x="0" y="60" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="44" letter-spacing="-1.5">RIDE FURTHER.</text>
        <text x="0" y="105" fill="url(#eb-ac)" font-family="Inter,sans-serif" font-weight="800" font-size="44" letter-spacing="-1.5">PEDAL LESS.</text>

        <text x="0" y="135" fill="#8090b8" font-family="Inter,sans-serif" font-size="12">Premium electric bikes built for everyday adventure.</text>

        <rect x="0" y="155" width="150" height="40" rx="0" fill="url(#eb-ac)"/>
        <text x="75" y="180" text-anchor="middle" fill="#05080f" font-family="Inter,sans-serif" font-weight="700" font-size="11">SHOP ALL E-BIKES →</text>
    </g>

    <!-- e-bike illustration -->
    <g transform="translate(440, 200)" stroke="#a3ff12" stroke-width="2" fill="none">
        <circle cx="60" cy="170" r="55"/>
        <circle cx="60" cy="170" r="20" stroke-width="1.5"/>
        <circle cx="240" cy="170" r="55"/>
        <circle cx="240" cy="170" r="20" stroke-width="1.5"/>
        <!-- frame -->
        <path d="M 60 170 L 150 100 L 220 100 L 240 170 Z" stroke-width="2.5"/>
        <line x1="150" y1="100" x2="170" y2="170"/>
        <line x1="170" y1="170" x2="60" y2="170"/>
        <!-- handlebar -->
        <line x1="220" y1="100" x2="230" y2="70" stroke-width="3"/>
        <line x1="215" y1="78" x2="245" y2="65" stroke-width="3"/>
        <!-- seat -->
        <rect x="135" y="92" width="30" height="6" rx="3" fill="#a3ff12"/>
        <!-- battery -->
        <rect x="155" y="120" width="50" height="20" rx="2" fill="#a3ff12" opacity="0.3" stroke-width="1.5"/>
        <text x="180" y="135" text-anchor="middle" fill="#a3ff12" font-family="Inter,sans-serif" font-size="9" font-weight="700" stroke="none">750W</text>
    </g>

    <g transform="translate(40, 420)" font-family="Inter,sans-serif">
        <text x="0" y="14" fill="#a3ff12" font-weight="800" font-size="22">80<tspan font-size="14">mi</tspan></text>
        <text x="0" y="32" fill="#8090b8" font-size="9" letter-spacing="1">RANGE</text>

        <text x="110" y="14" fill="#a3ff12" font-weight="800" font-size="22">28<tspan font-size="14">mph</tspan></text>
        <text x="110" y="32" fill="#8090b8" font-size="9" letter-spacing="1">TOP SPEED</text>

        <text x="240" y="14" fill="#a3ff12" font-weight="800" font-size="22">4<tspan font-size="14">hr</tspan></text>
        <text x="240" y="32" fill="#8090b8" font-size="9" letter-spacing="1">FULL CHARGE</text>
    </g>
</svg>
