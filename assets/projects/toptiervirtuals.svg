<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="tt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0e1a2e"/>
            <stop offset="100%" stop-color="#152843"/>
        </linearGradient>
        <linearGradient id="tt-ac" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff8a3d"/>
            <stop offset="100%" stop-color="#f06030"/>
        </linearGradient>
        <radialGradient id="tt-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="800" height="500" fill="url(#tt-bg)"/>
    <ellipse cx="640" cy="280" rx="260" ry="220" fill="url(#tt-glow)"/>

    <rect x="0" y="0" width="800" height="32" fill="#0a1424"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#152843"/>

    <g transform="translate(40, 60)">
        <rect x="0" y="2" width="26" height="26" rx="6" fill="url(#tt-ac)"/>
        <text x="13" y="20" text-anchor="middle" fill="#0e1a2e" font-family="Inter,sans-serif" font-weight="800" font-size="14">T</text>
        <text x="34" y="20" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="14">TopTier</text>
        <text x="100" y="20" fill="#ff8a3d" font-family="Inter,sans-serif" font-weight="700" font-size="14">Virtuals</text>

        <g font-family="Inter,sans-serif" font-size="10" fill="#8090b8" font-weight="500">
            <text x="460" y="20">Services</text>
            <text x="520" y="20">Pricing</text>
            <text x="570" y="20">VAs</text>
            <text x="608" y="20">About</text>
        </g>
        <rect x="650" y="2" width="100" height="26" rx="13" fill="url(#tt-ac)"/>
        <text x="700" y="20" text-anchor="middle" fill="#0e1a2e" font-family="Inter,sans-serif" font-weight="700" font-size="11">Book a Call</text>
    </g>

    <g transform="translate(40, 130)">
        <rect width="170" height="26" rx="13" fill="#152843" stroke="#ff8a3d" stroke-opacity="0.4"/>
        <text x="85" y="17" text-anchor="middle" fill="#ff8a3d" font-family="Inter,sans-serif" font-size="10" font-weight="600">⚡ TRUSTED BY 200+ CEOs</text>

        <text x="0" y="60" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="40" letter-spacing="-1.5">Elite virtual</text>
        <text x="0" y="105" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="40" letter-spacing="-1.5">assistants, on</text>
        <text x="0" y="150" fill="url(#tt-ac)" font-family="Inter,sans-serif" font-weight="800" font-size="40" letter-spacing="-1.5">demand.</text>

        <text x="0" y="180" fill="#8090b8" font-family="Inter,sans-serif" font-size="12">Top 1% talent matched to your business in 48 hours.</text>

        <rect x="0" y="200" width="150" height="40" rx="20" fill="url(#tt-ac)"/>
        <text x="75" y="225" text-anchor="middle" fill="#0e1a2e" font-family="Inter,sans-serif" font-weight="700" font-size="11">Get Matched →</text>

        <rect x="162" y="200" width="120" height="40" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.25"/>
        <text x="222" y="225" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="500" font-size="11">▶ Watch Demo</text>
    </g>

    <!-- VA cards -->
    <g transform="translate(490, 130)">
        <rect width="270" height="280" rx="16" fill="#1a2942" stroke="#ffffff" stroke-opacity="0.08"/>

        <!-- VA card 1 -->
        <g transform="translate(16, 20)">
            <circle cx="20" cy="20" r="18" fill="url(#tt-ac)"/>
            <text x="20" y="25" text-anchor="middle" fill="#0e1a2e" font-family="Inter,sans-serif" font-weight="700" font-size="13">SM</text>
            <circle cx="34" cy="34" r="5" fill="#22c55e" stroke="#1a2942" stroke-width="2"/>
            <text x="50" y="18" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="12">Sarah M.</text>
            <text x="50" y="32" fill="#8090b8" font-family="Inter,sans-serif" font-size="10">Executive VA · 8 yrs</text>
            <text x="218" y="22" fill="#ff8a3d" font-family="Inter,sans-serif" font-weight="700" font-size="11">★ 4.9</text>
            <rect y="48" width="238" height="3" rx="1.5" fill="#0e1a2e"/>
        </g>

        <!-- VA card 2 -->
        <g transform="translate(16, 90)">
            <circle cx="20" cy="20" r="18" fill="#7c5cff"/>
            <text x="20" y="25" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="13">JR</text>
            <circle cx="34" cy="34" r="5" fill="#22c55e" stroke="#1a2942" stroke-width="2"/>
            <text x="50" y="18" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="12">James R.</text>
            <text x="50" y="32" fill="#8090b8" font-family="Inter,sans-serif" font-size="10">Social Media · 5 yrs</text>
            <text x="218" y="22" fill="#ff8a3d" font-family="Inter,sans-serif" font-weight="700" font-size="11">★ 5.0</text>
            <rect y="48" width="238" height="3" rx="1.5" fill="#0e1a2e"/>
        </g>

        <!-- VA card 3 -->
        <g transform="translate(16, 160)">
            <circle cx="20" cy="20" r="18" fill="#4dabff"/>
            <text x="20" y="25" text-anchor="middle" fill="#0e1a2e" font-family="Inter,sans-serif" font-weight="700" font-size="13">AL</text>
            <circle cx="34" cy="34" r="5" fill="#febc2e" stroke="#1a2942" stroke-width="2"/>
            <text x="50" y="18" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="12">Anna L.</text>
            <text x="50" y="32" fill="#8090b8" font-family="Inter,sans-serif" font-size="10">Bookkeeping · 6 yrs</text>
            <text x="218" y="22" fill="#ff8a3d" font-family="Inter,sans-serif" font-weight="700" font-size="11">★ 4.8</text>
        </g>

        <!-- CTA in card -->
        <g transform="translate(16, 220)">
            <rect width="238" height="44" rx="10" fill="#0e1a2e"/>
            <text x="119" y="20" text-anchor="middle" fill="#8090b8" font-family="Inter,sans-serif" font-size="9">YOUR PERFECT MATCH IN</text>
            <text x="119" y="36" text-anchor="middle" fill="url(#tt-ac)" font-family="Inter,sans-serif" font-weight="800" font-size="14">48 HOURS ⚡</text>
        </g>
    </g>
</svg>
