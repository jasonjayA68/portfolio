<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="gi-sky" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#9ec5da"/>
            <stop offset="100%" stop-color="#c6e1d4"/>
        </linearGradient>
        <linearGradient id="gi-cliff" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#5a8a4a"/>
            <stop offset="100%" stop-color="#3a5a2a"/>
        </linearGradient>
    </defs>

    <rect width="800" height="500" fill="url(#gi-sky)"/>
    <!-- Clouds -->
    <ellipse cx="180" cy="100" rx="60" ry="14" fill="#fff" opacity="0.7"/>
    <ellipse cx="560" cy="80" rx="80" ry="16" fill="#fff" opacity="0.7"/>

    <!-- Cliffs -->
    <path d="M 0 380 L 0 280 L 80 290 L 140 270 L 220 285 L 280 260 L 360 280 L 420 240 L 500 270 L 580 250 L 660 290 L 800 270 L 800 500 L 0 500 Z" fill="url(#gi-cliff)"/>
    <!-- Sea -->
    <path d="M 0 380 L 800 380 L 800 410 L 0 410 Z" fill="#2c5f7c"/>
    <path d="M 0 380 L 800 380" stroke="#fff" stroke-width="1" opacity="0.4"/>

    <rect x="0" y="0" width="800" height="32" fill="#ffffff"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#e6f0e8"/>

    <g transform="translate(40, 60)">
        <text x="0" y="22" fill="#1a4020" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="22">Go Irish Tours</text>
        <g font-family="Inter,sans-serif" font-size="10" fill="#1a4020" font-weight="600">
            <text x="450" y="22">Tours</text>
            <text x="495" y="22">Destinations</text>
            <text x="565" y="22">Reviews</text>
            <text x="615" y="22">FAQ</text>
        </g>
        <rect x="650" y="6" width="100" height="22" rx="11" fill="#1a4020"/>
        <text x="700" y="21" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="10">Plan My Trip</text>
    </g>

    <g transform="translate(40, 130)">
        <text x="0" y="0" fill="#1a4020" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="3">PRIVATE TOURS · SINCE 2008</text>
        <text x="0" y="55" fill="#1a4020" font-family="Georgia,serif" font-weight="700" font-size="44" letter-spacing="-1.5">Discover the</text>
        <text x="0" y="105" fill="#1a4020" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="44" letter-spacing="-1.5">Emerald Isle.</text>
        <text x="0" y="135" fill="#3a5a3a" font-family="Inter,sans-serif" font-size="13">Custom Ireland itineraries with local guides who know every hidden gem.</text>
        <rect x="0" y="158" width="150" height="40" rx="20" fill="#1a4020"/>
        <text x="75" y="183" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="11">Explore Tours →</text>

        <rect x="162" y="158" width="120" height="40" rx="20" fill="none" stroke="#1a4020" stroke-width="1.5"/>
        <text x="222" y="183" text-anchor="middle" fill="#1a4020" font-family="Inter,sans-serif" font-weight="500" font-size="11">▶ Watch Video</text>
    </g>

    <g transform="translate(40, 430)" font-family="Inter,sans-serif">
        <text x="0" y="14" fill="#fff" font-weight="700" font-size="18">15+</text>
        <text x="0" y="32" fill="#fff" font-size="9" opacity="0.9" letter-spacing="1">YEARS OPERATING</text>

        <text x="130" y="14" fill="#fff" font-weight="700" font-size="18">★ 4.9</text>
        <text x="130" y="32" fill="#fff" font-size="9" opacity="0.9" letter-spacing="1">3,200+ REVIEWS</text>

        <text x="270" y="14" fill="#fff" font-weight="700" font-size="18">100%</text>
        <text x="270" y="32" fill="#fff" font-size="9" opacity="0.9" letter-spacing="1">CUSTOM ITINERARIES</text>
    </g>
</svg>
