<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="se-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f6f0ff"/>
            <stop offset="50%" stop-color="#efe4ff"/>
            <stop offset="100%" stop-color="#fff4e6"/>
        </linearGradient>
        <linearGradient id="se-gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c9a574"/>
            <stop offset="100%" stop-color="#9a7a48"/>
        </linearGradient>
        <radialGradient id="se-aura" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b8a0e8" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#b8a0e8" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="800" height="500" fill="url(#se-bg)"/>
    <circle cx="650" cy="180" r="170" fill="url(#se-aura)"/>
    <circle cx="100" cy="400" r="140" fill="url(#se-aura)" opacity="0.6"/>

    <rect x="0" y="0" width="800" height="32" fill="#ffffff"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <rect x="280" y="8" width="240" height="16" rx="4" fill="#efe4ff"/>

    <g transform="translate(40, 60)">
        <text x="0" y="22" fill="#4a2a6a" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="22">Subtle Energies</text>
        <g font-family="Inter,sans-serif" font-size="10" fill="#5a4a6a" font-weight="500">
            <text x="450" y="22">Shop Oils</text>
            <text x="515" y="22">Treatments</text>
            <text x="585" y="22">Training</text>
            <text x="645" y="22">Wholesale</text>
            <text x="710" y="22">Account</text>
        </g>
    </g>

    <g transform="translate(40, 130)">
        <text x="0" y="0" fill="url(#se-gold)" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="3">AYURVEDIC AROMATHERAPY · SINCE 1993</text>
        <text x="0" y="55" fill="#3a1a5a" font-family="Georgia,serif" font-weight="700" font-size="40" letter-spacing="-1">Essential oils,</text>
        <text x="0" y="100" fill="#3a1a5a" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="40" letter-spacing="-1">essential wellbeing.</text>
        <text x="0" y="130" fill="#5a4a6a" font-family="Inter,sans-serif" font-size="12">Australia's leading Ayurvedic aromatherapy brand.</text>
        <rect x="0" y="150" width="140" height="40" rx="20" fill="#3a1a5a"/>
        <text x="70" y="174" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="600" font-size="11">Shop Collection →</text>
    </g>

    <!-- Bottle illustration -->
    <g transform="translate(560, 130)">
        <!-- Cap -->
        <rect x="55" y="0" width="40" height="18" rx="2" fill="url(#se-gold)"/>
        <rect x="50" y="18" width="50" height="10" fill="url(#se-gold)"/>
        <!-- Neck -->
        <rect x="62" y="28" width="26" height="14" fill="#9a7a48"/>
        <!-- Body -->
        <path d="M 40 42 Q 30 50 30 70 L 30 200 Q 30 215 45 215 L 105 215 Q 120 215 120 200 L 120 70 Q 120 50 110 42 Z" fill="#4a2a6a" opacity="0.85"/>
        <path d="M 40 42 Q 30 50 30 70 L 30 200 Q 30 215 45 215 L 105 215 Q 120 215 120 200 L 120 70 Q 120 50 110 42 Z" fill="#3a1a5a" opacity="0.4"/>
        <!-- Label -->
        <rect x="40" y="90" width="70" height="80" fill="#f6f0ff" rx="2"/>
        <text x="75" y="115" text-anchor="middle" fill="#9a7a48" font-family="Georgia,serif" font-style="italic" font-size="11" font-weight="700">Subtle</text>
        <text x="75" y="128" text-anchor="middle" fill="#9a7a48" font-family="Georgia,serif" font-style="italic" font-size="11" font-weight="700">Energies</text>
        <line x1="50" y1="138" x2="100" y2="138" stroke="url(#se-gold)" stroke-width="0.5"/>
        <text x="75" y="152" text-anchor="middle" fill="#5a4a6a" font-family="Inter,sans-serif" font-size="7" letter-spacing="1">PURE ROSE</text>
        <text x="75" y="162" text-anchor="middle" fill="#5a4a6a" font-family="Inter,sans-serif" font-size="6">10ml · 100%</text>
        <!-- Highlight -->
        <ellipse cx="50" cy="80" rx="6" ry="40" fill="#fff" opacity="0.25"/>
    </g>

    <g transform="translate(40, 410)" font-family="Inter,sans-serif">
        <g>
            <circle cx="14" cy="14" r="14" fill="#3a1a5a" opacity="0.1"/>
            <text x="14" y="19" text-anchor="middle" fill="#3a1a5a" font-weight="700" font-size="14">✦</text>
            <text x="34" y="13" fill="#3a1a5a" font-weight="600" font-size="11">100% Pure</text>
            <text x="34" y="26" fill="#5a4a6a" font-size="9">Certified organic</text>
        </g>
        <g transform="translate(180, 0)">
            <circle cx="14" cy="14" r="14" fill="#3a1a5a" opacity="0.1"/>
            <text x="14" y="19" text-anchor="middle" fill="#3a1a5a" font-weight="700" font-size="14">✦</text>
            <text x="34" y="13" fill="#3a1a5a" font-weight="600" font-size="11">Ayurvedic</text>
            <text x="34" y="26" fill="#5a4a6a" font-size="9">30+ years expertise</text>
        </g>
        <g transform="translate(360, 0)">
            <circle cx="14" cy="14" r="14" fill="#3a1a5a" opacity="0.1"/>
            <text x="14" y="19" text-anchor="middle" fill="#3a1a5a" font-weight="700" font-size="14">✦</text>
            <text x="34" y="13" fill="#3a1a5a" font-weight="600" font-size="11">Worldwide</text>
            <text x="34" y="26" fill="#5a4a6a" font-size="9">Free shipping AUD $150+</text>
        </g>
    </g>
</svg>
